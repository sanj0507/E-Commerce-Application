spring.application.name=ecommerce
# ===================================================================
# 1. Real PostgreSQL SQL Database Configuration
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommercedb
spring.datasource.username=postgres
spring.datasource.password=devpassword

spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate/JPA Configuration
# Note: Modern Spring Boot automatically detects the dialect, but keeping it explicit is fine!
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===================================================================
# 2. Redis Configuration
# ===================================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===================================================================
# 3. Google OAuth 2.0 Configuration
# ===================================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email